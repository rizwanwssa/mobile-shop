<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Installments · Mobile Shop System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="nav" data-nav></header>
    <main class="page">
      <div class="page__header">
        <div class="page__title">Installments / Khata</div>
        <button class="btn btn--primary" id="addBtn">+ Add Installment</button>
      </div>

      <div class="card">
        <h3 class="card__title">Due Reminders (next 7 days)</h3>
        <div class="table-wrap">
          <table class="data" id="dueTable">
            <thead><tr><th>Customer</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead>
            <tbody id="dueBody"><tr><td colspan="5">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card hidden" id="formCard">
        <h3 class="card__title">Add Installment Schedule</h3>
        <form id="instForm">
          <div class="form-grid">
            <div class="field"><label>Customer</label><select id="i_customer" required></select></div>
            <div class="field"><label>Amount</label><input id="i_amount" type="number" step="0.01" min="0" required></div>
            <div class="field col-span-2"><label>Due Date</label><input id="i_due" type="date" required></div>
          </div>
          <div class="btn-row mt">
            <button class="btn btn--primary" type="submit">Save</button>
            <button class="btn btn--ghost" type="button" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3 class="card__title">Ledgers (customer balances)</h3>
        <div class="table-wrap">
          <table class="data" id="ledgerTable">
            <thead><tr><th>Customer</th><th>Balance</th><th>Schedules</th></tr></thead>
            <tbody id="ledgerBody"><tr><td colspan="3">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/installments.js"></script>
</body>
</html>
