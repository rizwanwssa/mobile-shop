<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Inventory · Mobile Shop System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="nav" data-nav></header>
    <main class="page">
      <div class="page__header">
        <div class="page__title">Inventory</div>
        <button class="btn btn--primary" id="addBtn">+ Add Unit</button>
      </div>

      <div class="card">
        <div class="row mb" style="justify-content:flex-start;">
          <input id="search" class="field" placeholder="Search brand / model / IMEI…" style="max-width:280px;">
        </div>
        <div class="table-wrap">
          <table class="data" id="invTable">
            <thead>
              <tr>
                <th>Brand/Model</th><th>Color</th><th>IMEI1</th>
                <th class="col-price owner-only">Purchase</th><th>Sale</th>
                <th>Status</th><th></th>
              </tr>
            </thead>
            <tbody id="invBody"><tr><td colspan="7">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- Add/Edit form -->
      <div class="card hidden" id="formCard">
        <h3 class="card__title" id="formTitle">Add Unit</h3>
        <form id="invForm">
          <input type="hidden" id="unitId">
          <div class="form-grid">
            <div class="field"><label>Brand</label><input id="f_brand" required></div>
            <div class="field"><label>Model</label><input id="f_model" required></div>
            <div class="field"><label>Color</label><input id="f_color"></div>
            <div class="field col-span-2"><label>Specs</label><textarea id="f_specs" rows="2"></textarea></div>
            <div class="field"><label>IMEI 1</label><input id="f_imei1"></div>
            <div class="field"><label>IMEI 2</label><input id="f_imei2"></div>
            <div class="field owner-only"><label>Purchase Price</label><input id="f_purchase" type="number" step="0.01" min="0"></div>
            <div class="field"><label>Sale Price</label><input id="f_sale" type="number" step="0.01" min="0"></div>
          </div>
          <div class="btn-row mt">
            <button class="btn btn--primary" type="submit">Save</button>
            <button class="btn btn--ghost" type="button" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/inventory.js"></script>
</body>
</html>
