<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Sign in · Mobile Shop System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm">
      <h1>📱 Mobile Shop</h1>
      <p class="sub">Point of Sale &amp; Management</p>
      <div class="field mb">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
      </div>
      <div class="field mb">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div id="err" class="denied hidden" style="margin-bottom:12px;"></div>
      <button class="btn btn--primary" type="submit" style="width:100%;" id="submitBtn">Sign in</button>
      <p class="muted" style="text-align:center;font-size:.78rem;margin-top:16px;">
        Use the owner credentials set during <code>npm run seed</code>.
      </p>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
