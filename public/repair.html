<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Repairs · Mobile Shop System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="nav" data-nav></header>
    <main class="page">
      <div class="page__header">
        <div class="page__title">Repairs</div>
        <button class="btn btn--primary" id="addBtn">+ Add Repair</button>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data" id="repTable">
            <thead><tr><th>Token</th><th>Customer</th><th>Device</th><th>Status</th><th>Fee</th><th class="owner-only">Profit</th><th></th></tr></thead>
            <tbody id="repBody"><tr><td colspan="7">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card hidden" id="formCard">
        <h3 class="card__title">Add Repair</h3>
        <form id="repForm">
          <div class="form-grid">
            <div class="field"><label>Customer Name</label><input id="r_name" required></div>
            <div class="field"><label>Phone</label><input id="r_phone"></div>
            <div class="field"><label>Device Model</label><input id="r_model"></div>
            <div class="field col-span-2"><label>Problem</label><textarea id="r_problem" rows="2"></textarea></div>
            <div class="field"><label>Parts Cost</label><input id="r_parts" type="number" step="0.01" min="0" value="0"></div>
            <div class="field"><label>Service Fee</label><input id="r_fee" type="number" step="0.01" min="0" value="0"></div>
          </div>
          <div class="btn-row mt">
            <button class="btn btn--primary" type="submit">Save</button>
            <button class="btn btn--ghost" type="button" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/repair.js"></script>
</body>
</html>
