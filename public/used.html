<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Used Buying · Mobile Shop System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="nav" data-nav></header>
    <main class="page">
      <div class="page__header">
        <div class="page__title">Used Phone Buying</div>
      </div>

      <div class="card">
        <h3 class="card__title">Record a Purchase</h3>
        <form id="usedForm">
          <div class="form-grid">
            <div class="field"><label>Seller Name</label><input id="u_name" required></div>
            <div class="field"><label>Seller Phone</label><input id="u_phone"></div>
            <div class="field"><label>Seller CNIC</label><input id="u_cnic"></div>
            <div class="field"><label>Model</label><input id="u_model"></div>
            <div class="field"><label>IMEI 1</label><input id="u_imei1"></div>
            <div class="field"><label>IMEI 2</label><input id="u_imei2"></div>
            <div class="field col-span-2"><label>Condition</label><textarea id="u_cond" rows="2"></textarea></div>
            <div class="field"><label>Price (Rs)</label><input id="u_price" type="number" step="0.01" min="0" required></div>
          </div>

          <h4 class="mt">Seller Signature <button type="button" class="btn btn--sm btn--ghost" id="clearSign">Clear</button></h4>
          <div class="canvas-box"><canvas id="signCanvas" class="sign"></canvas></div>

          <h4 class="mt">Thumb Impression</h4>
          <div class="field">
            <label>Draw thumb or upload image:</label>
            <canvas id="thumbCanvas" class="sign"></canvas>
            <div class="btn-row mt">
              <button type="button" class="btn btn--sm btn--ghost" id="clearThumb">Clear</button>
              <input type="file" id="thumbFile" accept="image/*">
            </div>
          </div>

          <div class="btn-row mt">
            <button class="btn btn--primary" type="submit">Save Purchase</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h3 class="card__title">Recent Purchases</h3>
        <div class="table-wrap">
          <table class="data" id="usedTable">
            <thead><tr><th>Receipt</th><th>Seller</th><th>Model</th><th>Price</th><th></th></tr></thead>
            <tbody id="usedBody"><tr><td colspan="5">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/used.js"></script>
</body>
</html>
